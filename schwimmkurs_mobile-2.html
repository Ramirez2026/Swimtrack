<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a4a3c">
<title>SwimTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --water-deep: #0a4a3c;
    --water-mid: #1a7a62;
    --water-light: #2db88f;
    --water-pale: #e0f5ef;
    --sand: #f7f2e8;
    --sand-dark: #e2d9c4;
    --ink: #0d1f1a;
    --ink-mid: #2e4a40;
    --ink-soft: #6a8a80;
    --tile: #ffffff;
    --absent: #c44a2a;
    --absent-light: #fdf0ec;
    --radius: 14px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    background: var(--sand);
    color: var(--ink);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--water-deep);
    padding: calc(var(--safe-top) + 0.75rem) 1rem 0;
    flex-shrink: 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--water-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .logo-text {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 19px;
    color: #fff;
  }
  .logo-text b { color: var(--water-light); font-weight: 600; }

  .header-date {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    text-align: right;
    line-height: 1.5;
  }

  /* ── COURSE SCROLLER ── */
  .course-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .course-scroll::-webkit-scrollbar { display: none; }

  .ctab {
    flex-shrink: 0;
    padding: 0.5rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .ctab.active { color: var(--water-light); border-bottom-color: var(--water-light); }

  /* ── STATS ── */
  .stats {
    background: var(--water-deep);
    padding: 0.6rem 1rem 0.9rem;
    flex-shrink: 0;
  }
  .stats-inner {
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    display: grid;
    grid-template-columns: repeat(3,1fr);
  }
  .stat {
    padding: 0.55rem 0;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: #fff;
    line-height: 1;
  }
  .stat-num.g { color: var(--water-light); }
  .stat-num.r { color: #ff8a70; }
  .stat-lbl {
    font-size: 9px;
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* ── SCROLLABLE LIST AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.75rem 0.9rem;
    padding-bottom: calc(var(--safe-bottom) + 4.5rem);
  }

  /* ── ADD ROW ── */
  .add-row {
    display: flex;
    gap: 7px;
    margin-bottom: 0.7rem;
  }
  .add-input {
    flex: 1;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    background: var(--tile);
    color: var(--ink);
    outline: none;
    min-width: 0;
  }
  .add-input:focus { border-color: var(--water-light); }
  .add-input::placeholder { color: #b0c4be; }
  .add-btn {
    padding: 0.6rem 0.9rem;
    background: var(--water-mid);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    width: 44px;
  }
  .add-btn:active { transform: scale(0.94); background: var(--water-deep); }

  /* ── QUICK ACTIONS ── */
  .quick-row {
    display: flex;
    gap: 6px;
    margin-bottom: 0.7rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .quick-row::-webkit-scrollbar { display: none; }
  .qbtn {
    flex-shrink: 0;
    padding: 0.38rem 0.75rem;
    background: var(--tile);
    border: 1.5px solid var(--sand-dark);
    border-radius: 99px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-mid);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .qbtn:active { background: var(--water-pale); border-color: var(--water-light); color: var(--water-mid); transform: scale(0.95); }

  /* ── LIST ── */
  .plist { display: flex; flex-direction: column; gap: 5px; }

  .pcard {
    background: var(--tile);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.65rem 0.75rem;
    border: 1.5px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-5px);} to {opacity:1;transform:translateY(0);}}
  .pcard.present {
    background: var(--water-pale);
    border-color: rgba(45,184,143,0.28);
  }

  .pnum {
    font-size: 10px;
    color: var(--ink-soft);
    width: 18px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .pname {
    flex: 1;
    font-size: 14px;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    border: 1.5px solid transparent;
    border-radius: 6px;
    background: transparent;
    padding: 2px 5px;
    outline: none;
    min-width: 0;
    transition: border-color 0.12s;
  }
  .pname:focus {
    border-color: var(--water-light);
    background: #fff;
  }

  /* ── TOGGLE ── */
  .toggle {
    position: relative;
    width: 48px;
    height: 26px;
    flex-shrink: 0;
  }
  .toggle input { opacity:0; width:0; height:0; position:absolute; }
  .ttrack {
    position: absolute; inset: 0;
    background: var(--sand-dark);
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.18s;
  }
  .toggle input:checked + .ttrack { background: var(--water-light); }
  .tthumb {
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toggle input:checked ~ .tthumb { transform: translateX(22px); }

  .delbtn {
    width: 28px; height: 28px;
    background: none; border: none;
    font-size: 14px;
    color: #ccc;
    cursor: pointer;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .delbtn:active { color: var(--absent); background: var(--absent-light); }

  /* ── EMPTY ── */
  .empty {
    padding: 2.5rem 1rem;
    text-align: center;
    color: var(--ink-soft);
  }
  .empty .big { font-family:'Fraunces',serif; font-size:40px; margin-bottom:8px; }
  .empty p { font-size:12px; line-height:1.6; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--tile);
    border-top: 1px solid var(--sand-dark);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 0.65rem 0.5rem;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.12s;
  }
  .nav-btn .icon { font-size: 20px; line-height: 1; }
  .nav-btn:active { color: var(--water-mid); }
  .nav-btn.danger:active { color: var(--absent); }

  /* ── MODAL ── */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(10,30,25,0.55);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .backdrop.open { display: flex; }
  .sheet {
    background: var(--tile);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 1.25rem 1.25rem calc(var(--safe-bottom) + 1.25rem);
    max-height: 75dvh;
    overflow-y: auto;
    animation: sheetUp 0.22s ease;
  }
  @keyframes sheetUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--sand-dark);
    border-radius: 99px;
    margin: -0.25rem auto 1.1rem;
  }
  .sheet h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 1rem;
  }
  .sheet-input {
    width: 100%;
    padding: 0.65rem 0.85rem;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    background: var(--sand);
    color: var(--ink);
    outline: none;
    margin-bottom: 0.75rem;
  }
  .sheet-input:focus { border-color: var(--water-light); }
  .sheet-actions { display: flex; gap: 8px; }
  .sbtn {
    flex: 1; padding: 0.7rem;
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--sand-dark);
    background: var(--sand);
    color: var(--ink-mid);
    transition: opacity 0.12s;
  }
  .sbtn.primary { background: var(--water-mid); color:#fff; border-color: var(--water-mid); }
  .sbtn:active { opacity: 0.75; }

  .clist { display:flex; flex-direction:column; gap:7px; margin-bottom:1rem; }
  .citem {
    display:flex; align-items:center; gap:8px;
    background: var(--sand); border-radius: var(--radius-sm);
    padding: 0.6rem 0.8rem; font-size:13px;
  }
  .citem span { flex:1; }
  .cdel { background:none; border:none; color:#ccc; font-size:16px; cursor:pointer; padding:4px; border-radius:6px; }
  .cdel:active { color: var(--absent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 5rem;
    left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: #fff;
    padding: 0.5rem 1.1rem;
    border-radius: 99px;
    font-size: 12px;
    opacity: 0;
    transition: all 0.22s;
    z-index: 400;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div class="logo">
        <div class="logo-icon">🌊</div>
        <div class="logo-text">Swim<b>Track</b></div>
      </div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="course-scroll" id="courseTabs"></div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stats-inner">
      <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Gesamt</div></div>
      <div class="stat"><div class="stat-num g" id="sPresent">0</div><div class="stat-lbl">Anwesend</div></div>
      <div class="stat"><div class="stat-num r" id="sAbsent">0</div><div class="stat-lbl">Abwesend</div></div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">
    <div class="add-row">
      <input class="add-input" id="newName" type="text" placeholder="Name hinzufügen…" />
      <button class="add-btn" onclick="addPerson()">＋</button>
    </div>
    <div class="quick-row">
      <button class="qbtn" onclick="checkAll()">✓ Alle an.</button>
      <button class="qbtn" onclick="uncheckAll()">○ Alle abw.</button>
      <button class="qbtn" onclick="sortList()">⇅ Sort.</button>
      <button class="qbtn" onclick="exportCSV()">↓ CSV</button>
      <button class="qbtn" onclick="printList()">⎙ Print</button>
    </div>
    <div class="plist" id="list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn" onclick="checkAll()">
      <span class="icon">✓</span>
      <span>Alle an.</span>
    </button>
    <button class="nav-btn" onclick="uncheckAll()">
      <span class="icon">○</span>
      <span>Alle abw.</span>
    </button>
    <button class="nav-btn" onclick="exportCSV()">
      <span class="icon">↓</span>
      <span>Export</span>
    </button>
    <button class="nav-btn" onclick="openModal()">
      <span class="icon">⚙</span>
      <span>Kurse</span>
    </button>
  </div>
</div>

<!-- MODAL SHEET -->
<div class="backdrop" id="modal" onclick="closeOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Kurse verwalten</h2>
    <div class="clist" id="modalCourses"></div>
    <p style="font-size:11px;color:var(--ink-soft);margin-bottom:0.6rem;">Neuen Kurs hinzufügen:</p>
    <input class="sheet-input" id="newCourse" placeholder="z.B. Aqua Fit – Do 17:00" />
    <div class="sheet-actions">
      <button class="sbtn" onclick="closeModal()">Abbrechen</button>
      <button class="sbtn primary" onclick="addCourse()">Erstellen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'swimtrack_mobile_v1';
const DEF = {
  courses: {
    "Anfänger 1 – Mo 10:00": ["Anna Meier","Ben Schulz","Clara Müller","David Keller","Emma Huber","Felix Braun","Greta Schneider"],
    "Anfänger 2 – Mi 14:00": ["Isabelle Koch","Jonas Richter","Klara Zimmermann","Leon Weber","Marie Suter"],
    "Fortgeschrittene – Fr 16:00": ["Mia Fischer","Noah Bauer","Olivia Herrmann","Paul Schmid"],
    "Aqua Fit – Di 09:00": ["Renate Pfister","Stefan Lind","Tanja Moll","Uwe Schäfer"]
  },
  attendance: {},
  current: "Anfänger 1 – Mo 10:00"
};

let S;

function load() {
  try { S = JSON.parse(localStorage.getItem(KEY)) || clone(DEF); }
  catch(e) { S = clone(DEF); }
}
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){} }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function init() {
  load();
  const now = new Date();
  document.getElementById('hDate').innerHTML =
    now.toLocaleDateString('de-CH',{weekday:'short'}) + '<br>' +
    now.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'2-digit'});
  document.getElementById('newName').addEventListener('keydown', e => { if(e.key==='Enter') addPerson(); });
  document.getElementById('newCourse').addEventListener('keydown', e => { if(e.key==='Enter') addCourse(); });
  renderTabs(); renderList();
}

function renderTabs() {
  const el = document.getElementById('courseTabs');
  el.innerHTML = '';
  Object.keys(S.courses).forEach(name => {
    const b = document.createElement('button');
    b.className = 'ctab' + (name === S.current ? ' active' : '');
    b.textContent = name;
    b.onclick = () => { S.current = name; save(); renderTabs(); renderList(); };
    el.appendChild(b);
  });
  // scroll active tab into view
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({inline:'center', behavior:'smooth'});
}

function renderList() {
  const people = S.courses[S.current] || [];
  const att = S.attendance[S.current] || {};
  const el = document.getElementById('list');
  let present = 0;

  if (!people.length) {
    el.innerHTML = `<div class="empty"><div class="big">🏊</div><p>Noch keine Teilnehmer.<br>Name oben eingeben.</p></div>`;
  } else {
    el.innerHTML = '';
    people.forEach((name, i) => {
      const isPresent = !!att[name];
      if (isPresent) present++;
      const card = document.createElement('div');
      card.className = 'pcard' + (isPresent ? ' present' : '');
      card.innerHTML = `
        <span class="pnum">${i+1}</span>
        <input class="pname" value="${esc(name)}" data-idx="${i}" />
        <label class="toggle">
          <input type="checkbox" ${isPresent?'checked':''} data-name="${esc(name)}">
          <div class="ttrack"></div>
          <div class="tthumb"></div>
        </label>
        <button class="delbtn" data-idx="${i}">✕</button>
      `;
      card.querySelector('input[type=checkbox]').addEventListener('change', function() {
        if (!S.attendance[S.current]) S.attendance[S.current] = {};
        if (this.checked) S.attendance[S.current][this.dataset.name] = true;
        else delete S.attendance[S.current][this.dataset.name];
        save(); renderList();
      });
      const ni = card.querySelector('.pname');
      ni.addEventListener('blur', function() {
        const nv = this.value.trim();
        const idx = +this.dataset.idx;
        if (!nv || nv === S.courses[S.current][idx]) return;
        const old = S.courses[S.current][idx];
        S.courses[S.current][idx] = nv;
        const a = S.attendance[S.current] || {};
        if (a[old]) { a[nv]=true; delete a[old]; }
        save(); renderList();
      });
      ni.addEventListener('keydown', e => { if(e.key==='Enter') e.target.blur(); });
      card.querySelector('.delbtn').addEventListener('click', function() {
        const idx = +this.dataset.idx;
        const n = S.courses[S.current][idx];
        if (!confirm(`"${n}" entfernen?`)) return;
        delete (S.attendance[S.current]||{})[n];
        S.courses[S.current].splice(idx,1);
        save(); renderList();
      });
      el.appendChild(card);
    });
  }

  document.getElementById('sTotal').textContent = people.length;
  document.getElementById('sPresent').textContent = present;
  document.getElementById('sAbsent').textContent = people.length - present;
}

function addPerson() {
  const inp = document.getElementById('newName');
  const name = inp.value.trim();
  if (!name) return;
  if (!S.courses[S.current]) S.courses[S.current] = [];
  if (S.courses[S.current].includes(name)) { showToast('Name bereits vorhanden'); inp.select(); return; }
  S.courses[S.current].push(name);
  inp.value = ''; inp.blur();
  save(); renderList();
}

function checkAll() {
  if (!S.attendance[S.current]) S.attendance[S.current] = {};
  (S.courses[S.current]||[]).forEach(n => S.attendance[S.current][n]=true);
  save(); renderList(); showToast('Alle als anwesend markiert');
}

function uncheckAll() {
  S.attendance[S.current] = {};
  save(); renderList(); showToast('Alle als abwesend markiert');
}

function sortList() {
  if (S.courses[S.current]) S.courses[S.current].sort((a,b)=>a.localeCompare(b,'de'));
  save(); renderList(); showToast('Alphabetisch sortiert');
}

function exportCSV() {
  const people = S.courses[S.current]||[];
  const att = S.attendance[S.current]||{};
  const now = new Date().toLocaleDateString('de-CH');
  let csv = `Name,Status,Datum\n`;
  people.forEach(n => csv += `"${n}","${att[n]?'Anwesend':'Abwesend'}","${now}"\n`);
  const present = people.filter(n=>att[n]).length;
  csv += `\n"Gesamt","${people.length}",""\n"Anwesend","${present}",""\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `SwimTrack_${S.current.replace(/[^a-zA-Z0-9]/g,'_')}_${now.replace(/\./g,'-')}.csv`;
  a.click();
  showToast('CSV exportiert ✓');
}

function printList() {
  const people = S.courses[S.current]||[];
  const att = S.attendance[S.current]||{};
  const now = new Date().toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  const present = people.filter(n=>att[n]).length;
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>Teilnehmerliste</title>
  <style>body{font-family:Arial,sans-serif;padding:15mm;color:#111}h1{font-size:16px;margin-bottom:3px}.sub{font-size:12px;color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:11px;border-bottom:2px solid #111;padding:5px 7px}td{padding:7px;font-size:12px;border-bottom:1px solid #ddd}.chk{width:18px;height:18px;border:1.5px solid #333;display:inline-block;border-radius:3px}.present .chk{background:#1a7a62;border-color:#1a7a62}.foot{margin-top:16px;font-size:11px;color:#666}</style>
  </head><body>
  <h1>Teilnehmerliste – ${S.current}</h1>
  <div class="sub">${now} | Anwesend: ${present}/${people.length}</div>
  <table><tr><th>#</th><th>Name</th><th>Anwesend</th><th>Unterschrift</th></tr>
  ${people.map((n,i)=>`<tr class="${att[n]?'present':''}"><td>${i+1}</td><td>${n}</td><td><span class="chk"></span></td><td style="width:100px"></td></tr>`).join('')}
  </table><div class="foot">Gedruckt: ${now}</div></body></html>`);
  w.document.close(); w.print();
}

function openModal() {
  renderModalCourses();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeOutside(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function renderModalCourses() {
  const el = document.getElementById('modalCourses');
  const keys = Object.keys(S.courses);
  el.innerHTML = keys.length ? keys.map(c=>`
    <div class="citem">
      <span>${c}</span>
      <button class="cdel" onclick="deleteCourse('${esc(c)}')">✕</button>
    </div>`).join('') : '<p style="font-size:12px;color:var(--ink-soft)">Keine Kurse.</p>';
}

function deleteCourse(name) {
  if (!confirm(`Kurs "${name}" löschen?`)) return;
  delete S.courses[name]; delete S.attendance[name];
  if (S.current===name) S.current = Object.keys(S.courses)[0]||'';
  save(); renderModalCourses(); renderTabs(); renderList();
}

function addCourse() {
  const inp = document.getElementById('newCourse');
  const name = inp.value.trim();
  if (!name) return;
  if (S.courses[name]) { showToast('Kurs bereits vorhanden'); return; }
  S.courses[name]=[]; S.attendance[name]={}; S.current=name;
  inp.value='';
  save(); renderModalCourses(); renderTabs(); renderList(); closeModal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
